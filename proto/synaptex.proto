syntax = "proto3";

package synaptex.v1;

// ─── Service ──────────────────────────────────────────────────────────────────

service DeviceService {
  rpc GetDeviceState(GetDeviceStateRequest)   returns (GetDeviceStateResponse);
  rpc SetDeviceState(SetDeviceStateRequest)   returns (SetDeviceStateResponse);
  rpc ListDevices(ListDevicesRequest)          returns (ListDevicesResponse);
  rpc WatchDeviceState(WatchDeviceStateRequest) returns (stream DeviceStateEvent);
  rpc RegisterDevice(RegisterDeviceRequest)   returns (RegisterDeviceResponse);
  rpc UnregisterDevice(UnregisterDeviceRequest) returns (UnregisterDeviceResponse);

  // ── Groups ──
  rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse);
  rpc UpdateGroup(UpdateGroupRequest) returns (UpdateGroupResponse);

  // ── Rooms ──
  rpc CreateRoom(CreateRoomRequest)             returns (CreateRoomResponse);
  rpc UpdateRoom(UpdateRoomRequest)             returns (UpdateRoomResponse);
  rpc DeleteRoom(DeleteRoomRequest)             returns (DeleteRoomResponse);
  rpc ListRooms(ListRoomsRequest)               returns (ListRoomsResponse);
  rpc GetRoom(GetRoomRequest)                   returns (GetRoomResponse);
  rpc SendRoomCommand(SendRoomCommandRequest)   returns (SendRoomCommandResponse);

  // ── Routines ──
  rpc CreateRoutine(CreateRoutineRequest)   returns (CreateRoutineResponse);
  rpc UpdateRoutine(UpdateRoutineRequest)   returns (UpdateRoutineResponse);
  rpc DeleteRoutine(DeleteRoutineRequest)   returns (DeleteRoutineResponse);
  rpc ListRoutines(ListRoutinesRequest)     returns (ListRoutinesResponse);
  rpc GetRoutine(GetRoutineRequest)         returns (GetRoutineResponse);
  rpc TriggerRoutine(TriggerRoutineRequest) returns (TriggerRoutineResponse);
  rpc CancelRoutine(CancelRoutineRequest)   returns (CancelRoutineResponse);
}

// ─── Core Types ───────────────────────────────────────────────────────────────

message DeviceId {
  string mac = 1;  // "AA:BB:CC:DD:EE:FF"
}

message DeviceInfo {
  DeviceId            id           = 1;
  string              name         = 2;
  string              model        = 3;
  string              protocol     = 4;
  repeated Capability capabilities = 5;
}

enum Capability {
  CAPABILITY_UNSPECIFIED = 0;
  CAPABILITY_POWER       = 1;
  CAPABILITY_DIMMER      = 2;
  CAPABILITY_COLOR_TEMP  = 3;
  CAPABILITY_RGB         = 4;
  CAPABILITY_SWITCH      = 5;
  CAPABILITY_FAN         = 6;
  CAPABILITY_IR          = 7;
}

message DeviceState {
  DeviceId device_id     = 1;
  bool     online        = 2;
  uint64   updated_at_ms = 3;

  optional bool     power        = 4;
  optional uint32   brightness   = 5;
  optional uint32   color_temp_k = 6;
  optional RgbValue rgb          = 7;

  map<uint32, bool> switches = 8;
}

message RgbValue {
  uint32 r = 1;
  uint32 g = 2;
  uint32 b = 3;
}

// ─── RPC Messages ─────────────────────────────────────────────────────────────

message GetDeviceStateRequest  { DeviceId device_id = 1; }
message GetDeviceStateResponse { DeviceState state  = 1; }

message SetDeviceStateRequest {
  DeviceId device_id = 1;

  oneof command {
    bool          set_power        = 2;
    uint32        set_brightness   = 3;
    uint32        set_color_temp_k = 4;
    RgbValue      set_rgb          = 5;
    SwitchCommand set_switch       = 6;
    SendIrCommand send_ir          = 7;
    SetDpCommand  set_dp           = 8;
  }
}

message SwitchCommand {
  uint32 index = 1;
  bool   state = 2;
}

/// Send an IR key code via a Tuya IR transceiver.
message SendIrCommand {
  string head = 1;  // optional device header blob (may be empty)
  string key  = 2;  // IR key code string
}

/// Write a raw Tuya DP value (for generic / fan / other devices).
message SetDpCommand {
  uint32 dp = 1;
  oneof value {
    bool   bool_val   = 2;
    int64  int_val    = 3;
    string string_val = 4;
  }
}

message SetDeviceStateResponse {
  bool   ok            = 1;
  string error_message = 2;
}

message ListDevicesRequest  {}
message ListDevicesResponse { repeated DeviceInfo devices = 1; }

// ─── Registration ─────────────────────────────────────────────────────────────

message TuyaConfig {
  string ip         = 1;
  uint32 port       = 2;
  string tuya_id    = 3;
  string local_key  = 4;
  /// DP profile preset: "bulb_a" | "bulb_b" | "switch" | "fan" | "ir1" | "ir2"
  string dp_profile = 5;
}

message RegisterDeviceRequest {
  DeviceInfo info        = 1;
  TuyaConfig tuya_config = 2;
}

message RegisterDeviceResponse {
  bool   ok            = 1;
  string error_message = 2;
}

message UnregisterDeviceRequest  { DeviceId device_id = 1; }
message UnregisterDeviceResponse { bool ok = 1; }

message WatchDeviceStateRequest { repeated DeviceId device_ids = 1; }
message DeviceStateEvent        { DeviceState state = 1; }

// ─── Groups ───────────────────────────────────────────────────────────────────

message CreateGroupRequest {
  string            name       = 1;
  string            model      = 2;
  repeated DeviceId member_ids = 3;
}
message CreateGroupResponse {
  bool     ok            = 1;
  string   error_message = 2;
  DeviceId id            = 3;
}

message UpdateGroupRequest {
  DeviceId          group_id   = 1;
  string            name       = 2;
  repeated DeviceId member_ids = 3;
}
message UpdateGroupResponse {
  bool   ok            = 1;
  string error_message = 2;
}

// ─── Rooms ────────────────────────────────────────────────────────────────────

message RoomInfo {
  string            id         = 1;
  string            name       = 2;
  repeated DeviceId device_ids = 3;
}

message CreateRoomRequest  { string name = 1; repeated DeviceId device_ids = 2; }
message CreateRoomResponse { bool ok = 1; string error_message = 2; string id = 3; }

message UpdateRoomRequest {
  string            room_id    = 1;
  string            name       = 2;
  repeated DeviceId device_ids = 3;
}
message UpdateRoomResponse { bool ok = 1; string error_message = 2; }

message DeleteRoomRequest  { string room_id = 1; }
message DeleteRoomResponse { bool ok = 1; string error_message = 2; }

message ListRoomsRequest   {}
message ListRoomsResponse  { repeated RoomInfo rooms = 1; }

message GetRoomRequest     { string room_id = 1; }
message GetRoomResponse    { RoomInfo room = 1; }

message SendRoomCommandRequest {
  string room_id = 1;
  oneof command {
    bool          set_power        = 2;
    uint32        set_brightness   = 3;
    uint32        set_color_temp_k = 4;
    RgbValue      set_rgb          = 5;
    SwitchCommand set_switch       = 6;
    SendIrCommand send_ir          = 7;
    SetDpCommand  set_dp           = 8;
  }
}
message SendRoomCommandResponse {
  bool   ok            = 1;
  string error_message = 2;
}

// ─── Routines ─────────────────────────────────────────────────────────────────

/// A single step in a routine that sends a command to a target.
message CommandStep {
  oneof target {
    string   room_id   = 1;
    DeviceId device_id = 2;
  }
  oneof command {
    bool          set_power        = 3;
    uint32        set_brightness   = 4;
    uint32        set_color_temp_k = 5;
    RgbValue      set_rgb          = 6;
    SwitchCommand set_switch       = 7;
    SendIrCommand send_ir          = 8;
    SetDpCommand  set_dp           = 9;
  }
}

message WaitStep { uint64 secs = 1; }

message RoutineStep {
  oneof step {
    CommandStep command = 1;
    WaitStep    wait    = 2;
  }
}

message RoutineInfo {
  string               id       = 1;
  string               name     = 2;
  string               schedule = 3;  // empty = manual only
  repeated RoutineStep steps    = 4;
}

message CreateRoutineRequest  { string name = 1; string schedule = 2; repeated RoutineStep steps = 3; }
message CreateRoutineResponse { bool ok = 1; string error_message = 2; string id = 3; }

message UpdateRoutineRequest  { string id = 1; string name = 2; string schedule = 3; repeated RoutineStep steps = 4; }
message UpdateRoutineResponse { bool ok = 1; string error_message = 2; }

message DeleteRoutineRequest  { string id = 1; }
message DeleteRoutineResponse { bool ok = 1; string error_message = 2; }

message ListRoutinesRequest   {}
message ListRoutinesResponse  { repeated RoutineInfo routines = 1; }

message GetRoutineRequest     { string id = 1; }
message GetRoutineResponse    { RoutineInfo routine = 1; }

message TriggerRoutineRequest  { string id = 1; }
message TriggerRoutineResponse { bool ok = 1; string error_message = 2; }

message CancelRoutineRequest   { string id = 1; }
message CancelRoutineResponse  { bool ok = 1; string error_message = 2; }
